name: shared
description: Shared utilities, constants, configurations, and common
  functionality used across all packages
version: 0.0.1
homepage: null
resolution: workspace

environment:
  sdk: ^3.10.7
  flutter: ">=1.17.0"

dependencies:
  auto_route: ^11.1.0
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  get_it: ^9.2.0
  google_fonts: ^6.2.1
  injectable: ^2.7.1+4
  intl: ^0.20.2

dev_dependencies:
  auto_route_generator: ^10.4.0
  build_runner: ^2.10.5
  flutter_gen_runner: ^5.12.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.12.0
  very_good_analysis: ^10.0.0

flutter_gen:
  output: lib/gen/

  integrations:
    flutter_svg: true

  colors:
    inputs:
      - assets/colors/colors.xml

flutter:
  generate: true
