name: shared
description: Shared utilities, constants, configurations, and common
  functionality used across all packages
publish_to: none
version: 0.0.1
homepage: null
resolution: workspace

environment:
  sdk: ^3.10.7
  flutter: ">=1.17.0"

dependencies:
  auto_route: ^11.1.0
  domain:
    path: ../domain
  firebase_analytics: ^12.1.1
  firebase_app_check: ^0.4.1+5
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  font_awesome_flutter: ^10.8.0
  get_it: ^9.2.0
  injectable: ^2.7.1+4
  intl: ^0.20.2
  sentry_flutter: ^9.3.0
  web: ^1.1.1

dev_dependencies:
  auto_route_generator: ^10.4.0
  build_runner: ^2.10.5
  flutter_gen_runner: ^5.12.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.12.0
  very_good_analysis: ^10.0.0

flutter_gen:
  output: lib/gen/

  integrations:
    flutter_svg: true

  colors:
    inputs:
      - assets/colors/colors.xml

flutter:
  generate: true
  fonts:
    - family: Teko
      fonts:
        - asset: assets/fonts/Teko.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Black.ttf
          weight: 900
