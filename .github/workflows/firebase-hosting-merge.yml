name: Deploy to Firebase Hosting (prod)
on:
  push:
    branches:
      - main
jobs:
  deploy_firestore_rules:
    name: Firestore Rules (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules --project cv-web-app-prod
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CV_WEB_APP_PROD }}

  build_and_deploy_cv:
    name: CV App (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Run code generation
        run: melos run build

      - name: Generate localization
        run: melos run l10n

      - name: Build web app (prod)
        run: cd apps/cv_app && flutter build web --target lib/main_prod.dart

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CV_WEB_APP_PROD }}
          channelId: live
          projectId: cv-web-app-prod
          entryPoint: apps/cv_app

  build_and_deploy_admin:
    name: Admin App (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Run code generation
        run: melos run build

      - name: Generate localization
        run: melos run l10n

      - name: Build admin app (prod)
        run: cd apps/admin_app && flutter build web --target lib/main_prod.dart

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CV_WEB_APP_PROD }}
          channelId: live
          projectId: cv-web-app-prod
          target: admin
          entryPoint: apps/admin_app
