name: cv_web_app
description: CV Web Application monorepo - A clean architecture Flutter web
  project with admin and public-facing applications
publish_to: none
environment:
  sdk: ^3.10.7
workspace:
  - packages/core/data
  - packages/core/domain
  - packages/core/shared
  - packages/features/admin_content
  - packages/features/cv_content
  - packages/features/auth
  - apps/cv_app
  - apps/admin_app

dev_dependencies:
  melos: ^7.4.0

melos:
  scripts:
    analyze:
      run: flutter analyze

    test:
      run: flutter test

    build:
      run: flutter pub run build_runner build --delete-conflicting-outputs
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: build_runner
      description: Run build_runner for all packages that depend on it

    # Alternative: Run build_runner with concurrency
    build:concurrent:
      run: flutter pub run build_runner build --delete-conflicting-outputs
      exec:
        concurrency: 4
      packageFilters:
        dependsOn: build_runner
      description: Run build_runner concurrently

    l10n:
      run: flutter gen-l10n
      exec:
        concurrency: 1
      packageFilters:
        fileExists: l10n.yaml
      description: Generate localization files for all packages

    l10n:shared:
      run: melos exec --scope="shared" -- flutter gen-l10n
      description: Generate localization files for shared package

    # CV app commands
    run:cv:dev:
      run: melos exec --scope="cv_app" -- flutter run -d chrome -t lib/main_dev.dart
      description: Run cv app in dev mode

    run:admin:dev:
      run: melos exec --scope="admin_app" -- flutter run -d chrome -t lib/main_dev.dart
      description: Run admin app in dev mode
